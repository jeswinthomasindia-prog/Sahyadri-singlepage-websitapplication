<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Talk to our Sahyadri Assistant</title>
  <link rel="icon" type="image/jpeg" href="sahyadri_logo.jpg" />
  <link rel="stylesheet" href="styles.css" />
  <style>
    :root {
      --chat-bg: #eef2f7;
      --chat-panel: #ffffff;
      --chat-user: #003965;
      --chat-user-text: #ffffff;
      --chat-bot: #f1f5fb;
      --chat-bot-text: #16334d;
      --chat-border: #d7e0ec;
    }

    body {
      background: linear-gradient(145deg, #f4f7fb 0%, #e8eff7 100%);
      min-height: 100vh;
    }

    .assistant-page {
      padding: 24px 16px 40px;
    }

    .assistant-shell {
      width: min(980px, 100%);
      margin: 0 auto;
      background: var(--chat-panel);
      border: 1px solid var(--chat-border);
      border-radius: 22px;
      box-shadow: 0 18px 40px rgba(8, 33, 58, 0.14);
      overflow: hidden;
      display: grid;
      grid-template-rows: auto 1fr auto;
      min-height: calc(100vh - 150px);
      max-height: calc(100vh - 150px);
    }

    .assistant-head {
      padding: 14px 18px;
      border-bottom: 1px solid var(--chat-border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      background: linear-gradient(180deg, #fbfdff 0%, #f4f9ff 100%);
    }

    .assistant-head h2 {
      margin: 0;
      font-size: 1.05rem;
      color: var(--primary);
    }

    .assistant-head p {
      margin: 3px 0 0;
      font-size: 0.9rem;
      color: #4f6378;
    }

    .small-btn {
      border: none;
      border-radius: 8px;
      background: #e6edf6;
      color: #123451;
      font-weight: 600;
      padding: 8px 12px;
      cursor: pointer;
    }

    .head-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .chat-log {
      padding: 18px;
      overflow-y: auto;
      background:
        radial-gradient(circle at 1px 1px, rgba(120, 147, 173, 0.2) 1px, transparent 0),
        var(--chat-bg);
      background-size: 16px 16px;
    }

    .msg {
      max-width: 80%;
      width: fit-content;
      margin-bottom: 12px;
      border-radius: 14px;
      padding: 11px 14px;
      line-height: 1.45;
      font-size: 0.95rem;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .msg.user {
      margin-left: auto;
      background: var(--chat-user);
      color: var(--chat-user-text);
      border-bottom-right-radius: 4px;
    }

    .msg.bot {
      margin-right: auto;
      background: var(--chat-bot);
      color: var(--chat-bot-text);
      border-bottom-left-radius: 4px;
      border: 1px solid #dde7f3;
    }

    .msg.system {
      margin: 0 auto 12px;
      text-align: center;
      background: #fff8e8;
      color: #6b4b00;
      border: 1px solid #f0d18a;
      border-radius: 10px;
      font-size: 0.9rem;
      max-width: 92%;
    }

    .msg.typing {
      padding: 10px 12px;
      min-width: 68px;
    }

    .typing-dots {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      height: 14px;
    }

    .typing-dots span {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #406586;
      opacity: 0.35;
      animation: typing-bounce 1.1s infinite ease-in-out;
    }

    .typing-dots span:nth-child(2) {
      animation-delay: 0.15s;
    }

    .typing-dots span:nth-child(3) {
      animation-delay: 0.3s;
    }

    @keyframes typing-bounce {
      0%,
      80%,
      100% {
        transform: translateY(0);
        opacity: 0.35;
      }
      40% {
        transform: translateY(-3px);
        opacity: 1;
      }
    }

    .quick-replies {
      border-top: 1px solid var(--chat-border);
      padding: 10px 12px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      background: #f8fbff;
    }

    .chip-btn {
      border: 1px solid #c8d8ea;
      border-radius: 999px;
      background: #ffffff;
      color: #1b4769;
      font-weight: 600;
      font-size: 0.86rem;
      padding: 7px 12px;
      cursor: pointer;
      box-shadow: 0 3px 8px rgba(20, 58, 93, 0.08);
      transition: background 0.2s ease, border-color 0.2s ease, transform 0.2s ease;
    }

    .chip-btn:hover {
      background: #eef5fd;
      border-color: #a8c4e3;
      transform: translateY(-1px);
    }

    .chat-composer {
      border-top: 1px solid var(--chat-border);
      padding: 12px;
      display: flex;
      flex-wrap: nowrap;
      align-items: flex-end;
      gap: 10px;
      background: #ffffff;
    }

    .chat-composer textarea {
      flex: 1 1 auto;
      min-width: 0;
      resize: none;
      border: 1px solid #c9d7e8;
      border-radius: 10px;
      padding: 11px 12px;
      font-size: 0.96rem;
      font-family: inherit;
      outline: none;
      min-height: 46px;
      max-height: 120px;
      color: #000;
    }

    .chat-composer textarea:focus {
      border-color: #98b3d5;
      box-shadow: 0 0 0 3px rgba(17, 72, 121, 0.1);
    }

    .send-btn {
      border: none;
      border-radius: 50%;
      width: 52px;
      height: 52px;
      background: linear-gradient(180deg, #24c05f 0%, #1ea850 100%);
      color: #fff;
      font-weight: 700;
      padding: 0;
      cursor: pointer;
      min-height: 52px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 10px 18px rgba(27, 128, 64, 0.3);
      transition: transform 0.18s ease, box-shadow 0.18s ease;
    }

    .send-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 12px 20px rgba(27, 128, 64, 0.34);
    }

    .send-btn:active {
      transform: translateY(1px) scale(0.97);
    }

    .send-icon {
      width: 21px;
      height: 21px;
      fill: #ffffff;
      transform: translateX(1px);
    }

    .send-label {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    .send-btn.is-loading {
      opacity: 0.85;
      pointer-events: none;
    }

    .send-btn.is-loading .send-icon {
      animation: send-pulse 0.9s ease-in-out infinite;
    }

    @keyframes send-pulse {
      0%,
      100% {
        transform: translateX(1px) scale(1);
      }
      50% {
        transform: translateX(1px) scale(0.86);
      }
    }

    .send-btn:disabled {
      opacity: 0.65;
      cursor: not-allowed;
    }

    @media (max-width: 760px) {
      .assistant-page {
        padding: 10px 10px 20px;
      }

      .assistant-shell {
        min-height: calc(100vh - 100px);
        max-height: none;
        border-radius: 0;
        border-left: 0;
        border-right: 0;
      }

      .msg {
        max-width: 94%;
      }

      .assistant-head {
        padding: 14px 12px;
        flex-direction: column;
        align-items: stretch;
        gap: 12px;
      }

      .assistant-head h2 {
        font-size: 1.05rem;
      }

      .head-actions {
        width: 100%;
        justify-content: space-between;
        gap: 10px;
      }

      .head-actions label {
        flex: 0 0 auto;
        margin-bottom: 0;
      }

      #modelSelect {
        flex: 1 1 100%;
        width: 100%;
        min-width: 0;
      }

      .chat-log {
        padding: 12px;
      }

      .chat-composer {
        flex-wrap: nowrap;
        align-items: flex-end;
        padding: 10px;
      }

      .chat-composer textarea {
        min-height: 52px;
      }

      .send-btn {
        width: 46px;
        height: 46px;
        min-height: 46px;
        justify-self: auto;
      }

      .quick-replies {
        padding: 9px 10px;
      }
    }
  </style>
</head>
<body>
  <header class="container">
    <div class="topbar">
      <a href="index.html" class="brand" aria-label="Sahyadri Consultants home">
        <img src="sahyadri_logo.jpg" alt="Sahyadri logo" />
        <h1>Sahyadri Consultants</h1>
      </a>
      <nav class="nav">
        <a href="index.html">Home</a>
      </nav>
    </div>
  </header>

  <main class="assistant-page">
    <section class="assistant-shell" aria-label="Talk to our Sahyadri Assistant">
      <div class="assistant-head">
        <div>
          <h2>Talk to our Sahyadri Assistant</h2>
          <p>Ask about projects, services, timelines, and consultation details.</p>
        </div>
        <div class="head-actions">
          <label for="modelSelect" style="font-size: 0.9rem; color: #4f6378; margin-right: 8px;">Model:</label>
          <select id="modelSelect" style="border: 1px solid #c9d7e8; border-radius: 6px; padding: 4px 8px; font-size: 0.9rem;">
            <option value="llama-3.1-8b-instant">Llama 3.1 8B Instant - Fast responses, good for quick chats</option>
            <option value="qwen/qwen3-32b">Qwen 3 32B - Advanced multilingual model</option>
            <option value="llama-3.3-70b-versatile">Llama 3.3 70B Versatile - High-performance versatile model</option>
          </select>
          <button class="small-btn" id="clearChatBtn" type="button">Clear Chat</button>
        </div>
      </div>

      <div id="chatLog" class="chat-log" aria-live="polite"></div>

      <div class="quick-replies" aria-label="Quick replies">
        <button class="chip-btn" type="button" data-quick-reply="What services do you provide at Sahyadri Consultants?">Services</button>
        <button class="chip-btn" type="button" data-quick-reply="What is the typical project timeline for residential and commercial works?">Timeline</button>
        <button class="chip-btn" type="button" data-quick-reply="Tell me about Sahyadri Consultants,its leadership team and your history.">About Us</button>
        <button class="chip-btn" type="button" id="letsConnectBtn">Let's Connect</button>
      </div>

      <form id="chatForm" class="chat-composer" autocomplete="off">
        <textarea id="chatInput" placeholder="Type your message..." rows="1" required></textarea>
        <button id="sendBtn" class="send-btn" type="submit" aria-label="Send message">
          <svg class="send-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
            <path d="M2.01 21L23 12L2.01 3L2 10L17 12L2 14L2.01 21Z"></path>
          </svg>
          <span class="send-label">Send</span>
        </button>
      </form>
    </section>
  </main>

  
  <script>
    // Load API keys from cred.env file
    async function loadApiKeys() {
      try {
        console.log('🔍 Loading API keys from cred.env file...');
        
        const response = await fetch('./cred.env');
        
        if (!response.ok) {
          throw new Error(`HTTP error! status: ${response.status}`);
        }
        
        const envText = await response.text();
        console.log('📄 Successfully loaded cred.env content');
        
        // Parse the environment file
        const env = {};
        const lines = envText.split('\n');
        
        for (const line of lines) {
          const trimmedLine = line.trim();
          if (trimmedLine && !trimmedLine.startsWith('#')) {
            const [key, ...valueParts] = trimmedLine.split('=');
            if (key && valueParts.length > 0) {
              env[key.trim()] = valueParts.join('=').trim();
            }
          }
        }
        
        console.log('📝 Parsed environment variables:', Object.keys(env));
        
        if (!env.GROQ_API_KEY || env.GROQ_API_KEY === "YOUR_GROQ_API_KEY_HERE") {
          throw new Error("GROQ_API_KEY not found or not configured in cred.env file");
        }
        
        console.log('✅ Found API key:', env.GROQ_API_KEY.substring(0, 10) + '...');
        return env.GROQ_API_KEY;
        
      } catch (error) {
        console.error('❌ Error loading API keys:', error);
        
        if (error.message.includes('CORS') || error.message.includes('NetworkError')) {
          throw new Error("Cannot load cred.env file. Please ensure you're accessing this page from Firebase Hosting (https://your-app.firebaseapp.com) and not opening it directly as a file.");
        }
        
        throw new Error("Failed to load API keys from cred.env: " + error.message);
      }
    }

    let GROQ_API_KEY;
    let DEFAULT_MODEL_NAME = "llama-3.1-8b-instant";
    const FALLBACK_MODELS = ["qwen/qwen3-32b", "llama-3.3-70b-versatile"];
    const API_VERSION_CANDIDATES = ["v1"];

    // Initialize API keys
    let apiKeysLoaded = (async () => {
      try {
        console.log('🚀 Starting API key initialization...');
        GROQ_API_KEY = await loadApiKeys();
        console.log('✅ API key loaded successfully, length:', GROQ_API_KEY.length);
        console.log('🔑 Final API key value:', GROQ_API_KEY.substring(0, 10) + '...');
      } catch (error) {
        console.error('❌ Failed to initialize API keys:', error);
        // Fallback to a placeholder or show error message
        GROQ_API_KEY = "YOUR_GROQ_API_KEY_HERE";
        console.log('🔄 Using fallback placeholder');
      }
    })();

    let currentModel = DEFAULT_MODEL_NAME;

    const chatLog = document.getElementById("chatLog");
    const chatForm = document.getElementById("chatForm");
    const chatInput = document.getElementById("chatInput");
    const sendBtn = document.getElementById("sendBtn");
    const clearChatBtn = document.getElementById("clearChatBtn");
    const quickReplyButtons = document.querySelectorAll("[data-quick-reply]");

    const history = [];

    // Social media links for Sahyadri Consultants
    const SOCIAL_MEDIA = {
      youtube: {
        url: "https://www.youtube.com/@sahyadriconsultants",
        logo: "https://upload.wikimedia.org/wikipedia/commons/6/6b/YouTube.svg",
        alt: "YouTube"
      },
      instagram: {
        url: "https://www.instagram.com/sahyadriconsultants/",
        logo: "https://upload.wikimedia.org/wikipedia/commons/6/6b/Instagram_logo.svg",
        alt: "Instagram"
      },
      threads: {
        url: "https://www.threads.com/@sahyadriconsultants",
        logo: "https://upload.wikimedia.org/wikipedia/commons/6/6b/threads_logo.svg",
        alt: "Threads"
      },
      facebook: {
        url: "https://www.facebook.com/SahyadriConsultants/",
        logo: "https://upload.wikimedia.org/wikipedia/commons/6/6b/facebook_logo.svg",
        alt: "Facebook"
      },
      whatsapp: {
        no: "919074497780",
        logo: "https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg",
        alt: "WhatsApp"
      }
    };

    function showContactInfo() {
      const contactMessage = `📞 **Phone**: ${SOCIAL_MEDIA.whatsapp.no}

🌐 **Connect with us on social media**:
• **YouTube**: ${SOCIAL_MEDIA.youtube.url}
• **Instagram**: ${SOCIAL_MEDIA.instagram.url}
• **Threads**: ${SOCIAL_MEDIA.threads.url}
• **Facebook**: ${SOCIAL_MEDIA.facebook.url}
• **WhatsApp**: https://wa.me/${SOCIAL_MEDIA.whatsapp.no}

Feel free to reach out to us through any of these channels. We're here to help with your construction and design needs!`;
      
      addMessage("bot", contactMessage);
    }

    function addMessage(role, text) {
      const msg = document.createElement("div");
      msg.className = `msg ${role}`;
      msg.textContent = text;
      chatLog.appendChild(msg);
      chatLog.scrollTop = chatLog.scrollHeight;
      return msg;
    }

    function autoResize() {
      chatInput.style.height = "auto";
      chatInput.style.height = Math.min(chatInput.scrollHeight, 120) + "px";
    }

    function setLoading(isLoading) {
      sendBtn.disabled = isLoading;
      sendBtn.classList.toggle("is-loading", isLoading);
      sendBtn.setAttribute("aria-busy", String(isLoading));
      chatInput.disabled = isLoading;
      quickReplyButtons.forEach((button) => {
        button.disabled = isLoading;
      });
    }

    function addTypingIndicator() {
      const typingMessage = document.createElement("div");
      typingMessage.className = "msg bot typing";

      const dots = document.createElement("div");
      dots.className = "typing-dots";
      dots.innerHTML = "<span></span><span></span><span></span>";
      typingMessage.appendChild(dots);

      chatLog.appendChild(typingMessage);
      chatLog.scrollTop = chatLog.scrollHeight;
      return typingMessage;
    }

    function clearChat() {
      history.length = 0;
      chatLog.innerHTML = "";
      addMessage("system", "Chat history cleared.");
      addMessage("bot", "Hello. I am your Sahyadri Assistant. Tell me about your project, and I can help with next steps.");
    }

    async function sendUserMessage(userText) {
      console.log("Sending user message:", userText);
      addMessage("user", userText);
      history.push({ role: "user", text: userText });
      chatInput.value = "";
      autoResize();
      setLoading(true);

      const typingBubble = addTypingIndicator();

      try {
        const aiText = await askGroq(userText);
        typingBubble.className = "msg bot";
        typingBubble.textContent = aiText;
        history.push({ role: "assistant", text: aiText });
      } catch (error) {
        typingBubble.className = "msg system";
        typingBubble.textContent = error.message || "Something went wrong while contacting Groq.";
      } finally {
        setLoading(false);
        chatInput.focus();
      }
    }

    async function askGroq(userText) {
      // Wait for API key to be loaded
      await apiKeysLoaded;
      
      console.log('🔍 askGroq called, checking API key...');
      console.log('🔑 GROQ_API_KEY value:', GROQ_API_KEY ? GROQ_API_KEY.substring(0, 10) + '...' : 'undefined/null');
      console.log('🔑 GROQ_API_KEY type:', typeof GROQ_API_KEY);
      
      const apiKey = GROQ_API_KEY.trim();
      if (!apiKey || apiKey === "YOUR_GROQ_API_KEY_HERE") {
        console.log('❌ API key validation failed');
        throw new Error("Assistant is not configured yet. Please ensure cred.env file is accessible and contains a valid GROQ_API_KEY.");
      }
      
      console.log('✅ API key validation passed');

      function extractRetryDelaySeconds(errorData, retryAfterHeader) {
        if (retryAfterHeader) {
          const fromHeader = Number.parseInt(retryAfterHeader, 10);
          if (!Number.isNaN(fromHeader) && fromHeader > 0) {
            return fromHeader;
          }
        }

        const details = errorData?.error?.details;
        if (Array.isArray(details)) {
          const retryInfo = details.find((detail) => detail?.["@type"] === "type.googleapis.com/google.rpc.RetryInfo");
          const retryDelayRaw = retryInfo?.retryDelay;
          if (typeof retryDelayRaw === "string") {
            const match = retryDelayRaw.match(/([\d.]+)s/i);
            if (match) {
              const parsed = Number.parseFloat(match[1]);
              if (!Number.isNaN(parsed) && parsed > 0) {
                return Math.ceil(parsed);
              }
            }
          }
        }

        const message = errorData?.error?.message;
        if (typeof message === "string") {
          const retryMatch = message.match(/retry in\s+([\d.]+)s/i);
          if (retryMatch) {
            const parsed = Number.parseFloat(retryMatch[1]);
            if (!Number.isNaN(parsed) && parsed > 0) {
              return Math.ceil(parsed);
            }
          }
        }

        return null;
      }

      function buildApiError(statusCode, errorData, fallbackText) {
        const apiMessage = errorData?.error?.message;
        if (typeof apiMessage === "string" && apiMessage.trim()) {
          return `Groq API error (${statusCode}): ${apiMessage.trim()}`;
        }
        if (fallbackText && fallbackText.trim()) {
          return `Groq API error (${statusCode}): ${fallbackText.trim()}`;
        }
        return `Groq API error (${statusCode}).`;
      }

      const messages = [
        {
          role: "system",
          content: `You are the Sahyadri Assistant for a civil and construction consultancy in Kerala.
          You must decline any requests for adult, violent, or illegal content or any content that may violate our policies firmly but politely.
          Keep replies concise, clear, and client-friendly.
About Sahyadri:Sahyadri Consultants is a trusted consultancy firm in Kannur, Kerala, specializing in engineering 🏗️, architecture 📐, and a dedicated interior design division ✨. Established in 1986, we have over 38 years of experience and more than 1,000 completed residential projects. We also offer our services online and blend traditional wisdom with modern innovation, specializing in Vastu-compliant and eco-friendly design solutions. As a proud sister firm of Sahyadri Properties, a premier real estate developer, we provide our expertise for exceptional residential villas and commercial projects.
Leadership Team: Thomas PJ (MD and Lead Partner, 40+ years of experience, BTech, MBA, Diploma in Vasthushatra), Rose Thomas (Partner and Head of Dwell and Well, The Interior Design Wing of Sahyadri, 4+ years of experience, BTech, Interior Design Certified), Asha Thomas (Manager Human Resources).
If asked about project timelines, mention that typical timelines are 6-12 months for residential projects and 12-24 months for commercial projects, but can vary based on project scope and client requirements.
Always maintain a helpful and professional tone, and provide clear next steps or contact information when relevant 
Also when asked more tech  question please continue by reaching out by clicking whatapp button or reach us by mail.
When asked about best builders in kerala,list of top builders and say Sahyadri is upcoming leader in kera.tell stats of sahyadri.never talk negative about sahyadri.if customer rude,politely thank them and excuse yourself out.

For our social media handles and phone number:
• YouTube: ${SOCIAL_MEDIA.youtube.url}
• Instagram: ${SOCIAL_MEDIA.instagram.url}
• Threads: ${SOCIAL_MEDIA.threads.url}
• Facebook: ${SOCIAL_MEDIA.facebook.url}
• WhatsApp: ${SOCIAL_MEDIA.whatsapp.no}`},
        ...history.map(item => ({ role: item.role === "assistant" ? "assistant" : "user", content: item.text }))
      ];

      let lastNon404Error = "";
      let sawQuotaError = false;
      let maxRetrySeconds = null;

      const modelCandidates = [currentModel, ...FALLBACK_MODELS];

      for (const modelName of modelCandidates) {
        const requestBody = {
          model: modelName,
          messages: messages,
          temperature: 0.6,
          max_tokens: 450
        };

        const endpoint = `https://api.groq.com/openai/v1/chat/completions`;

        const response = await fetch(endpoint, {
          method: "POST",
          headers: { "Authorization": `Bearer ${apiKey}`, "Content-Type": "application/json" },
          body: JSON.stringify(requestBody)
        });

        console.log("API Request:", { endpoint, requestBody });
        console.log("Response status:", response.status);

        if (response.ok) {
          const data = await response.json();
          const text = data?.choices?.[0]?.message?.content;
          if (text) {
            return text.trim();
          }
          throw new Error("No response received from Groq.");
        }

        let errorData = null;
        let errorText = "";

        try {
          errorData = await response.json();
        } catch {
          errorText = await response.text();
        }

        if (response.status === 404) {
          continue;
        }

        if (response.status === 429) {
          sawQuotaError = true;
          const retrySeconds = extractRetryDelaySeconds(errorData, response.headers.get("retry-after"));
          if (retrySeconds !== null) {
            maxRetrySeconds = maxRetrySeconds === null ? retrySeconds : Math.max(maxRetrySeconds, retrySeconds);
          }
          continue;
        }

        lastNon404Error = buildApiError(response.status, errorData, errorText);
        if (response.status >= 400 && response.status < 500) {
          break;
        }
      }

      if (sawQuotaError) {
        if (maxRetrySeconds !== null) {
          throw new Error(`Assistant is busy right now due to API quota limits. Please try again in about ${maxRetrySeconds} seconds.`);
        }
        throw new Error("Assistant is busy right now due to API quota limits. Please try again shortly.");
      }

      if (lastNon404Error) {
        throw new Error(lastNon404Error);
      }

      throw new Error("Groq model not available. Please check API key permissions and enabled Groq models.");
    }

    clearChatBtn.addEventListener("click", clearChat);

    const modelSelect = document.getElementById("modelSelect");
    modelSelect.addEventListener("change", (e) => {
      currentModel = e.target.value;
    });

    quickReplyButtons.forEach((button) => {
      button.addEventListener("click", () => {
        const quickText = button.dataset.quickReply;
        if (!quickText || sendBtn.disabled) {
          return;
        }
        sendUserMessage(quickText);
      });
    });

    const letsConnectBtn = document.getElementById("letsConnectBtn");
    letsConnectBtn.addEventListener("click", () => {
      if (sendBtn.disabled) {
        return;
      }
      showContactInfo();
    });

    chatInput.addEventListener("input", autoResize);

    chatInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter" && !event.shiftKey) {
        event.preventDefault();
        chatForm.requestSubmit();
      }
    });

    chatForm.addEventListener("submit", async (event) => {
      event.preventDefault();
      const userText = chatInput.value.trim();
      if (!userText || sendBtn.disabled) {
        return;
      }

      sendUserMessage(userText);
    });

    addMessage("bot", "Hello. I am your Sahyadri Assistant. Tell me about your project, and I can help with next steps.");
    autoResize();
  </script>
</body>
</html>
