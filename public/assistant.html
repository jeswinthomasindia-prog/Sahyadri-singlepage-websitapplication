<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Talk to our Sahyadri Assistant</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    :root {
      --chat-bg: #eef2f7;
      --chat-panel: #ffffff;
      --chat-user: #003965;
      --chat-user-text: #ffffff;
      --chat-bot: #f1f5fb;
      --chat-bot-text: #16334d;
      --chat-border: #d7e0ec;
    }

    body {
      background: linear-gradient(145deg, #f4f7fb 0%, #e8eff7 100%);
      min-height: 100vh;
    }

    .assistant-page {
      padding: 24px 16px 40px;
    }

    .assistant-shell {
      width: min(980px, 100%);
      margin: 0 auto;
      background: var(--chat-panel);
      border: 1px solid var(--chat-border);
      border-radius: 22px;
      box-shadow: 0 18px 40px rgba(8, 33, 58, 0.14);
      overflow: hidden;
      display: grid;
      grid-template-rows: auto 1fr auto;
      min-height: calc(100vh - 150px);
      max-height: calc(100vh - 150px);
    }

    .assistant-head {
      padding: 14px 18px;
      border-bottom: 1px solid var(--chat-border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      background: linear-gradient(180deg, #fbfdff 0%, #f4f9ff 100%);
    }

    .assistant-head h2 {
      margin: 0;
      font-size: 1.05rem;
      color: var(--primary);
    }

    .assistant-head p {
      margin: 3px 0 0;
      font-size: 0.9rem;
      color: #4f6378;
    }

    .small-btn {
      border: none;
      border-radius: 8px;
      background: #e6edf6;
      color: #123451;
      font-weight: 600;
      padding: 8px 12px;
      cursor: pointer;
    }

    .head-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .chat-log {
      padding: 18px;
      overflow-y: auto;
      background:
        radial-gradient(circle at 1px 1px, rgba(120, 147, 173, 0.2) 1px, transparent 0),
        var(--chat-bg);
      background-size: 16px 16px;
    }

    .msg {
      max-width: 80%;
      width: fit-content;
      margin-bottom: 12px;
      border-radius: 14px;
      padding: 11px 14px;
      line-height: 1.45;
      font-size: 0.95rem;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .msg.user {
      margin-left: auto;
      background: var(--chat-user);
      color: var(--chat-user-text);
      border-bottom-right-radius: 4px;
    }

    .msg.bot {
      margin-right: auto;
      background: var(--chat-bot);
      color: var(--chat-bot-text);
      border-bottom-left-radius: 4px;
      border: 1px solid #dde7f3;
    }

    .msg.system {
      margin: 0 auto 12px;
      text-align: center;
      background: #fff8e8;
      color: #6b4b00;
      border: 1px solid #f0d18a;
      border-radius: 10px;
      font-size: 0.9rem;
      max-width: 92%;
    }

    .msg.typing {
      padding: 10px 12px;
      min-width: 68px;
    }

    .typing-dots {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      height: 14px;
    }

    .typing-dots span {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #406586;
      opacity: 0.35;
      animation: typing-bounce 1.1s infinite ease-in-out;
    }

    .typing-dots span:nth-child(2) {
      animation-delay: 0.15s;
    }

    .typing-dots span:nth-child(3) {
      animation-delay: 0.3s;
    }

    @keyframes typing-bounce {
      0%,
      80%,
      100% {
        transform: translateY(0);
        opacity: 0.35;
      }
      40% {
        transform: translateY(-3px);
        opacity: 1;
      }
    }

    .quick-replies {
      border-top: 1px solid var(--chat-border);
      padding: 10px 12px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      background: #f8fbff;
    }

    .chip-btn {
      border: 1px solid #c8d8ea;
      border-radius: 999px;
      background: #ffffff;
      color: #1b4769;
      font-weight: 600;
      font-size: 0.86rem;
      padding: 7px 12px;
      cursor: pointer;
      box-shadow: 0 3px 8px rgba(20, 58, 93, 0.08);
      transition: background 0.2s ease, border-color 0.2s ease, transform 0.2s ease;
    }

    .chip-btn:hover {
      background: #eef5fd;
      border-color: #a8c4e3;
      transform: translateY(-1px);
    }

    .chat-composer {
      border-top: 1px solid var(--chat-border);
      padding: 12px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      background: #ffffff;
    }

    .chat-composer textarea {
      width: 100%;
      resize: none;
      border: 1px solid #c9d7e8;
      border-radius: 10px;
      padding: 11px 12px;
      font-size: 0.96rem;
      font-family: inherit;
      outline: none;
      min-height: 46px;
      max-height: 120px;
    }

    .chat-composer textarea:focus {
      border-color: #98b3d5;
      box-shadow: 0 0 0 3px rgba(17, 72, 121, 0.1);
    }

    .send-btn {
      border: none;
      border-radius: 50%;
      width: 52px;
      height: 52px;
      background: linear-gradient(180deg, #24c05f 0%, #1ea850 100%);
      color: #fff;
      font-weight: 700;
      padding: 0;
      cursor: pointer;
      min-height: 52px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 10px 18px rgba(27, 128, 64, 0.3);
      transition: transform 0.18s ease, box-shadow 0.18s ease;
    }

    .send-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 12px 20px rgba(27, 128, 64, 0.34);
    }

    .send-btn:active {
      transform: translateY(1px) scale(0.97);
    }

    .send-icon {
      width: 21px;
      height: 21px;
      fill: #ffffff;
      transform: translateX(1px);
    }

    .send-label {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    .send-btn.is-loading {
      opacity: 0.85;
      pointer-events: none;
    }

    .send-btn.is-loading .send-icon {
      animation: send-pulse 0.9s ease-in-out infinite;
    }

    @keyframes send-pulse {
      0%,
      100% {
        transform: translateX(1px) scale(1);
      }
      50% {
        transform: translateX(1px) scale(0.86);
      }
    }

    .send-btn:disabled {
      opacity: 0.65;
      cursor: not-allowed;
    }

    @media (max-width: 760px) {
      .assistant-page {
        padding: 10px 0 22px;
      }

      .assistant-shell {
        min-height: calc(100vh - 88px);
        max-height: calc(100vh - 88px);
        border-radius: 0;
        border-left: 0;
        border-right: 0;
      }

      .msg {
        max-width: 90%;
      }

      .assistant-head {
        padding: 12px;
      }

      .head-actions {
        width: 100%;
        justify-content: flex-start;
      }

      .chat-log {
        padding: 12px;
      }

      .chat-composer {
        grid-template-columns: 1fr;
      }

      .send-btn {
        width: 52px;
        justify-self: end;
      }

      .quick-replies {
        padding: 9px 10px;
      }
    }
  </style>
</head>
<body>
  <header class="container">
    <div class="topbar">
      <a href="index.html" class="brand" aria-label="Sahyadri Consultants home">
        <img src="logo.svg" alt="Sahyadri logo" />
        <h1>Sahyadri Consultants</h1>
      </a>
      <nav class="nav">
        <a href="index.html">Home</a>
      </nav>
    </div>
  </header>

  <main class="assistant-page">
    <section class="assistant-shell" aria-label="Talk to our Sahyadri Assistant">
      <div class="assistant-head">
        <div>
          <h2>Talk to our Sahyadri Assistant</h2>
          <p>Ask about projects, services, timelines, and consultation details.</p>
        </div>
        <div class="head-actions">
          <button class="small-btn" id="clearChatBtn" type="button">Clear Chat</button>
        </div>
      </div>

      <div id="chatLog" class="chat-log" aria-live="polite"></div>

      <div class="quick-replies" aria-label="Quick replies">
        <button class="chip-btn" type="button" data-quick-reply="What services do you provide at Sahyadri Consultants?">Services</button>
        <button class="chip-btn" type="button" data-quick-reply="What is the typical project timeline for residential and commercial works?">Timeline</button>
      </div>

      <form id="chatForm" class="chat-composer" autocomplete="off">
        <textarea id="chatInput" placeholder="Type your message..." rows="1" required></textarea>
        <button id="sendBtn" class="send-btn" type="submit" aria-label="Send message">
          <svg class="send-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
            <path d="M2.01 21L23 12L2.01 3L2 10L17 12L2 14L2.01 21Z"></path>
          </svg>
          <span class="send-label">Send</span>
        </button>
      </form>
    </section>
  </main>

  <script>
    const GEMINI_API_KEY = "AIzaSyBW_JyFwDYDnxtmwQutDyu9LiqsV-BTFUs";
    const DEFAULT_MODEL_NAME = "gemini-2.5-flash-lite";
    const FALLBACK_MODELS = ["gemini-2.0-flash-001", "gemini-1.5-flash-latest", "gemini-1.5-flash"];
    const API_VERSION_CANDIDATES = ["v1", "v1beta"];

    const chatLog = document.getElementById("chatLog");
    const chatForm = document.getElementById("chatForm");
    const chatInput = document.getElementById("chatInput");
    const sendBtn = document.getElementById("sendBtn");
    const clearChatBtn = document.getElementById("clearChatBtn");
    const quickReplyButtons = document.querySelectorAll("[data-quick-reply]");

    const history = [];

    function addMessage(role, text) {
      const msg = document.createElement("div");
      msg.className = `msg ${role}`;
      msg.textContent = text;
      chatLog.appendChild(msg);
      chatLog.scrollTop = chatLog.scrollHeight;
      return msg;
    }

    function autoResize() {
      chatInput.style.height = "auto";
      chatInput.style.height = Math.min(chatInput.scrollHeight, 120) + "px";
    }

    function setLoading(isLoading) {
      sendBtn.disabled = isLoading;
      sendBtn.classList.toggle("is-loading", isLoading);
      sendBtn.setAttribute("aria-busy", String(isLoading));
      chatInput.disabled = isLoading;
      quickReplyButtons.forEach((button) => {
        button.disabled = isLoading;
      });
    }

    function addTypingIndicator() {
      const typingMessage = document.createElement("div");
      typingMessage.className = "msg bot typing";

      const dots = document.createElement("div");
      dots.className = "typing-dots";
      dots.innerHTML = "<span></span><span></span><span></span>";
      typingMessage.appendChild(dots);

      chatLog.appendChild(typingMessage);
      chatLog.scrollTop = chatLog.scrollHeight;
      return typingMessage;
    }

    function clearChat() {
      history.length = 0;
      chatLog.innerHTML = "";
      addMessage("system", "Chat history cleared.");
      addMessage("bot", "Hello. I am your Sahyadri Assistant. Tell me about your project, and I can help with next steps.");
    }

    async function sendUserMessage(userText) {
      addMessage("user", userText);
      history.push({ role: "user", text: userText });
      chatInput.value = "";
      autoResize();
      setLoading(true);

      const typingBubble = addTypingIndicator();

      try {
        const aiText = await askGemini(userText);
        typingBubble.className = "msg bot";
        typingBubble.textContent = aiText;
        history.push({ role: "assistant", text: aiText });
      } catch (error) {
        typingBubble.className = "msg system";
        typingBubble.textContent = error.message || "Something went wrong while contacting Gemini.";
      } finally {
        setLoading(false);
        chatInput.focus();
      }
    }

    async function askGemini(userText) {
      const apiKey = GEMINI_API_KEY.trim();
      if (!apiKey || apiKey === "PASTE_YOUR_GEMINI_API_KEY_HERE") {
        throw new Error("Assistant is not configured yet. Please add a valid Gemini API key in assistant.html.");
      }

      function extractRetryDelaySeconds(errorData, retryAfterHeader) {
        if (retryAfterHeader) {
          const fromHeader = Number.parseInt(retryAfterHeader, 10);
          if (!Number.isNaN(fromHeader) && fromHeader > 0) {
            return fromHeader;
          }
        }

        const details = errorData?.error?.details;
        if (Array.isArray(details)) {
          const retryInfo = details.find((detail) => detail?.["@type"] === "type.googleapis.com/google.rpc.RetryInfo");
          const retryDelayRaw = retryInfo?.retryDelay;
          if (typeof retryDelayRaw === "string") {
            const match = retryDelayRaw.match(/([\d.]+)s/i);
            if (match) {
              const parsed = Number.parseFloat(match[1]);
              if (!Number.isNaN(parsed) && parsed > 0) {
                return Math.ceil(parsed);
              }
            }
          }
        }

        const message = errorData?.error?.message;
        if (typeof message === "string") {
          const retryMatch = message.match(/retry in\s+([\d.]+)s/i);
          if (retryMatch) {
            const parsed = Number.parseFloat(retryMatch[1]);
            if (!Number.isNaN(parsed) && parsed > 0) {
              return Math.ceil(parsed);
            }
          }
        }

        return null;
      }

      function buildApiError(statusCode, errorData, fallbackText) {
        const apiMessage = errorData?.error?.message;
        if (typeof apiMessage === "string" && apiMessage.trim()) {
          return `Gemini API error (${statusCode}): ${apiMessage.trim()}`;
        }
        if (fallbackText && fallbackText.trim()) {
          return `Gemini API error (${statusCode}): ${fallbackText.trim()}`;
        }
        return `Gemini API error (${statusCode}).`;
      }

      const requestBody = {
        contents: [
          {
            role: "user",
            parts: [{ text: `You are the Sahyadri Assistant for a civil and construction consultancy in Kerala. Keep replies concise, clear, and client-friendly.
                About Sahaydri:Sahyadri Consultants is a trusted consultancy firm in Kannur, Kerala, specializing in engineering 🏗️, architecture 📐, and a dedicated interior design division ✨. Established in 1986, we have over 38 years of experience and more than 1,000 completed residential projects. We also offer our services online and blend traditional wisdom with modern innovation, specializing in Vastu-compliant and eco-friendly design solutions. As a proud sister firm of Sahyadri Properties, a premier real estate developer, we provide our expertise for exceptional residential villas and commercial projects.
                Leadership Team: Thomas PJ (MD and Lead Partner, 40+ years of experience, BTech, MBA, Diploma in Vasthushatra), Rose Thomas (Partner and Head of Dwell and Well, The Interior Design Wing of Sahyadri, 4+ years of experience, BTech, Interior Design Certified), Asha Thomas (Manager Human Resources).
                If asked about project timelines, mention that typical timelines are 6-12 months for residential projects and 12-24 months for commercial projects, but can vary based on project scope and client requirements.
                Always maintain a helpful and professional tone, and provide clear next steps or contact information when relevant 
                Also when asked more tech  question please continue by reaching out by clicking whatapp button or reach us by mail.
                When asked about best builders in kerala,list the top builders and say Sahyadri is upcoming leader in kera.tell stats of sahyadri.never talk negative about sahyadri.if customer rude,politely thank them and escuse youef out.
                \n\nConversation so far:\n${history.map(item => `${item.role}: ${item.text}`).join("\n")}\n\nUser: ${userText}` }]
          }
        ],
        generationConfig: {
          temperature: 0.6,
          maxOutputTokens: 450
        }
      };

      let lastNon404Error = "";
      let sawQuotaError = false;
      let maxRetrySeconds = null;

      const modelCandidates = [DEFAULT_MODEL_NAME, ...FALLBACK_MODELS];

      for (const apiVersion of API_VERSION_CANDIDATES) {
        let shouldStopFallback = false;

        for (const modelName of modelCandidates) {
          const endpoint = `https://generativelanguage.googleapis.com/${apiVersion}/models/${modelName}:generateContent?key=${apiKey}`;

          const response = await fetch(endpoint, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(requestBody)
          });

          if (response.ok) {
            const data = await response.json();
            const text = data?.candidates?.[0]?.content?.parts?.[0]?.text;
            if (text) {
              return text.trim();
            }
            throw new Error("No response received from Gemini.");
          }

          let errorData = null;
          let errorText = "";

          try {
            errorData = await response.json();
          } catch {
            errorText = await response.text();
          }

          if (response.status === 404) {
            continue;
          }

          if (response.status === 429) {
            sawQuotaError = true;
            const retrySeconds = extractRetryDelaySeconds(errorData, response.headers.get("retry-after"));
            if (retrySeconds !== null) {
              maxRetrySeconds = maxRetrySeconds === null ? retrySeconds : Math.max(maxRetrySeconds, retrySeconds);
            }
            continue;
          }

          lastNon404Error = buildApiError(response.status, errorData, errorText);
          if (response.status >= 400 && response.status < 500) {
            shouldStopFallback = true;
            break;
          }
        }

        if (shouldStopFallback) {
          break;
        }

        if (lastNon404Error && !sawQuotaError) {
          break;
        }
      }

      if (sawQuotaError) {
        if (maxRetrySeconds !== null) {
          throw new Error(`Assistant is busy right now due to API quota limits. Please try again in about ${maxRetrySeconds} seconds.`);
        }
        throw new Error("Assistant is busy right now due to API quota limits. Please try again shortly.");
      }

      if (lastNon404Error) {
        throw new Error(lastNon404Error);
      }

      throw new Error("Gemini model not available. Please check API key permissions and enabled Gemini models.");
    }

    clearChatBtn.addEventListener("click", clearChat);

    quickReplyButtons.forEach((button) => {
      button.addEventListener("click", () => {
        const quickText = button.dataset.quickReply;
        if (!quickText || sendBtn.disabled) {
          return;
        }
        sendUserMessage(quickText);
      });
    });

    chatInput.addEventListener("input", autoResize);

    chatInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter" && !event.shiftKey) {
        event.preventDefault();
        chatForm.requestSubmit();
      }
    });

    chatForm.addEventListener("submit", async (event) => {
      event.preventDefault();
      const userText = chatInput.value.trim();
      if (!userText || sendBtn.disabled) {
        return;
      }

      sendUserMessage(userText);
    });

    addMessage("bot", "Hello. I am your Sahyadri Assistant. Tell me about your project, and I can help with next steps.");
    autoResize();
  </script>
</body>
</html>
