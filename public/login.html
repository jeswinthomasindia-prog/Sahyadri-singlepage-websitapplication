<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | Sahyadri Consultants</title>
  <link rel="icon" type="image/jpeg" href="sahyadri_logo.jpg" />
  <link rel="stylesheet" href="styles.css" />
  <style>
    .loading-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.8);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 10000;
    }
    
    .loading-spinner {
      border: 3px solid var(--accent);
      border-top: 3px solid var(--accent);
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 0 auto 20px;
    }
    
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <header class="container">
    <div class="topbar">
      <a href="index.html" class="brand" aria-label="Sahyadri Consultants home">
        <img src="sahyadri_logo.jpg" alt="Sahyadri logo" />
        <h1>Sahyadri Consultants</h1>
      </a>
      <nav class="nav">
        <a href="index.html">Home</a>
      </nav>
    </div>
  </header>

  <main class="auth-page">
    <section class="auth-container">
      <div class="auth-card">
        <div class="auth-heading">
          <h2 id="authTitle">Welcome back</h2>
          <p id="authSubtitle">Login using your username and password.</p>
        </div>

        <form id="loginForm" class="auth-form" autocomplete="off" action="" method="post">
          <label for="usernameInput">Username</label>
          <input id="usernameInput" class="auth-input" type="text" placeholder="Enter your username or email" required />

          <label for="passwordInput">Password</label>
          <input id="passwordInput" class="auth-input" type="password" placeholder="Enter your password" required />

          <button type="submit" class="auth-btn" id="primaryAuthBtn">Login</button>
        </form>

        <p class="auth-note" id="authNote">Enter your username and password, then press the login button.</p>
      </div>
    </section>
  </main>

  <div id="loginToast" class="auth-toast" aria-live="polite" role="status"></div>
  <div id="loadingOverlay" class="loading-overlay" style="display: none;">
    <div class="loading-spinner"></div>
  </div>
  <script src="login.js"></script>
</body>
</html>
