<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | Sahyadri Consultants</title>
  <link rel="icon" type="image/jpeg" href="sahyadri_logo.jpg" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="container">
    <div class="topbar">
      <a href="index.html" class="brand" aria-label="Sahyadri Consultants home">
        <img src="sahyadri_logo.jpg" alt="Sahyadri logo" />
        <h1>Sahyadri Consultants</h1>
      </a>
      <nav class="nav">
        <a href="index.html">Home</a>
      </nav>
    </div>
  </header>

  <main class="auth-page">
    <section class="auth-container">
      <div class="auth-card">
        <div class="auth-heading">
          <h2 id="authTitle">Welcome back</h2>
          <p id="authSubtitle">Login using your username and password.</p>
        </div>

        <form id="loginForm" class="auth-form" autocomplete="off" action="" method="post">
          <label for="usernameInput">Username</label>
          <input id="usernameInput" class="auth-input" type="text" placeholder="Enter your username or email" required />

          <label for="passwordInput">Password</label>
          <input id="passwordInput" class="auth-input" type="password" placeholder="Enter your password" required />

          <button type="submit" class="auth-btn" id="primaryAuthBtn">Login</button>
        </form>

        <p class="auth-note" id="authNote">Enter your username and password, then press the login button.</p>
      </div>
    </section>
  </main>

  <div id="loginToast" class="auth-toast" aria-live="polite" role="status"></div>

  <script  src="login.js"></script>
</body>
</html>
