name: Simple PR Syntax Check for html,css,js and json

on:
  pull_request:

jobs:
  check-syntax-of-html-css-js-json:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Check HTML
        run:  npx htmlhint "**/*.html" --rules="tagname-lowercase=true,attr-lowercase=true,tag-pair=false,spec-char-escape=false,id-class-value=false,inline-style-disabled=true,inline-script-disabled=false,attr-no-duplication=true"

      - name: Check CSS
        run: npx stylelint "**/*.css" --allow-empty-input

      - name: Check JS
        run: npx terser "**/*.js" --parse

      - name: Check Firebase JSON
        run: npx jsonlint "**/*.json" --quiet
